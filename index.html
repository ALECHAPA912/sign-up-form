<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>La Web de Ale</title>
</head>
<body>
    <div class="plants-section">
        <div class="plants-container">
            <img src="images/odin-lined.png" alt="Odin">
            <div class="odin-text">ODIN</div>
        </div>
        <p class="photo-by">Photo by <a href="https://unsplash.com/es/@haliewestphoto" target="_blank">Halie West</a> on <a href="https://unsplash.com/" target="_blank">Unsplash</a></p>
    </div>
    <div class="form-section">
        <p class="main-text first">This is not a real online service! You know you need something 
            like this in your life to help you realize your deepest dreams.
        </p>
        <p class="main-text">Sign up <em>now</em> to get started.</p>
        <p class="main-text second">You <em>know</em> you want to.</p>
        <div class="form-container">
            <h2 class="main-text lets-do-this">Let's do this!</h2>
            <form action="" method="post" id="form">
                <div class="input-container">
                    <label for="first-name">FIRST NAME</label>
                    <input type="text" name="first-name" id="first-name" minlength="2" maxlength="30" required>
                </div>
                <div class="input-container">
                    <label for="last-name">LAST NAME</label>
                    <input type="text" name="last-name" id="last-name" minlength="2" maxlength="30" required>
                </div>
                <div class="input-container">
                    <label for="email">EMAIL</label>
                    <input type="email" name="email" id="email" placeholder="example@gmail.com" required>
                </div>
                <div class="input-container">
                    <label for="phone-number">PHONE NUMBER</label>
                    <input type="text" name="phone-number" id="phone-number" placeholder="+(54)-3432123456" title="Enter your phone number in the format shown; you can omit the parentheses and the hyphen." pattern="\+\(\d{1,3}\)\d{8,14}">
                </div>
                <div class="input-container">
                    <label for="password">PASSWORD</label>
                    <input type="password" name="password" id="password" pattern="^(?=.*[A-Z])(?=.*\d).{8,20}$" title="The password must contain at least one capital letter and one number." required>
                </div>
                <div class="input-container">
                    <label for="confirm-password">CONFIRM PASSWORD</label>
                    <input type="password" name="confirm-password" id="confirm-password" pattern="^(?=.*[A-Z])(?=.*\d).{8,20}$" title="Please re-enter your password to continue" required>
                </div>
            </form>
        </div>
        <button form="form">Create Account</button>
        <p class="have-account">Already have an account? <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ&list=RDdQw4w9WgXcQ&start_radio=1" target="_blank" class="log-in">Log in</a></p>
    </div>
</body>
</html>
